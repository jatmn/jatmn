name: Update profile metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Generate metrics
        run: npm run update
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN || github.token }}

      - name: Commit refreshed metrics
        run: |
          if git diff --quiet -- assets/profile-metrics.svg assets/profile-metrics.json; then
            echo "Metrics are already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/profile-metrics.svg assets/profile-metrics.json
          git commit -m "chore: refresh profile metrics"
          git push
